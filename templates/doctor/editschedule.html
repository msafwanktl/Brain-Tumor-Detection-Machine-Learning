{% extends 'doctor/doctorindex.html' %}
{% block body %}
<body>
<form action="/myapp/dr_editschedule_post/" method="post">
    {% csrf_token %}
    <input type="hidden" value="{{ doc.id }}" name="id"/>
    <table class="table table-bordered table-striped table-hover">
        <thead class="thead-dark">
  <tr>
    <td>Date</td>
    <td><input type="date" name="textfield" id="textfield" value="{{ doc.date |date:'Y-m-d' }}"/></td>
  </tr>
  <tr>
    <td>Starting Time</td>
    <td><input type="time" name="textfield2" id="textfield2" value="{{ doc.start }}"/></td>
  </tr>
  <tr>
    <td>Ending Time</td>
    <td><input type="time" name="textfield3" id="textfield3" value="{{ doc.end }}"/></td>
  </tr>
  <tr>
    <td>&nbsp;</td>
    <td><input type="submit" name="button" id="button" value="Submit" class="btn btn-success"/></td>
  </tr>
        </thead>
</table>

</form>
</body>
{% endblock %}
{#</html>#}
