{% extends 'doctor/doctorindex.html' %}
{% block body %}
<body>
<form id="form1" name="form1" method="post" action="/myapp/dr_addprescription_post/">
    {% csrf_token %}
  <table class="table table-bordered">
    <thead class="thead-dark">
    <tr>
      <td>Date</td>
      <td><input type="date" required name="textfield2" id="textfield2" /></td>
    </tr>
    <tr>
      <td>Prescription</td>
      <td><textarea name="textarea" required id="textarea" cols="45" rows="5"></textarea></td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td><input type="submit" name="button" id="button" value="Send Prescription" class="btn btn-success" /></td>
    </tr>
    </thead>
  </table>
</form>
</body>

{% endblock %}
