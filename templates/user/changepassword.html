{% extends 'user/userindex.html' %}
{% block body %}
<body><form action="/myapp/us_changepassword_post/" method="post">
    {% csrf_token %}
 <table class="table table-bordered">
    <thead class="thead-dark">
  <tr>
    <td>Old Password</td>
    <td><input type="text" name="textfield" required id="textfield" /></td>
  </tr>
  <tr>
    <td>New Password</td>
    <td><input type="text" name="textfield2" required id="textfield2" /></td>
  </tr>
  <tr>
    <td>Confirm Password</td>
    <td><input type="text" name="textfield3" required id="textfield3" /></td>
  </tr>
  <tr>
    <td>&nbsp;</td>
    <td><input type="submit" name="button" id="button" value="Change Password" class="btn btn-success" /></td>
  </tr>
    </thead>
</table>

</form>
</body>
{% endblock %}
